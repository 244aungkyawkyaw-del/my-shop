<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Online Shop</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f6f9; margin: 0; padding: 20px; text-align: center; }
        h1 { color: #333; margin-bottom: 30px; }
        .container { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; }
        .product-card { background: white; border-radius: 12px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); padding: 20px; width: 280px; text-align: center; }
        .product-card img { max-width: 100%; height: auto; border-radius: 8px; }
        .title { font-size: 18px; font-weight: bold; margin: 15px 0 5px; }
        .price { color: #28a745; font-weight: bold; font-size: 16px; margin-bottom: 15px; }
        .btn { background-color: #007bff; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-size: 14px; width: 100%; transition: 0.3s; }
        .btn:hover { background-color: #0056b3; }
        
        /* Order Form Style */
        .order-form-section { background: white; max-width: 450px; margin: 40px auto; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: left; }
        .order-form-section h2 { text-align: center; color: #333; margin-top: 0; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: bold; color: #555; }
        .form-group input, .form-group textarea, .form-group select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 14px; }
        .submit-btn { background-color: #28a745; color: white; border: none; padding: 12px; border-radius: 6px; cursor: pointer; font-size: 16px; font-weight: bold; width: 100%; transition: 0.3s; }
        .submit-btn:hover { background-color: #218838; }
    </style>
</head>
<body>

    <h1>Welcome to My Online Shop 🚀</h1>

    <!-- ပစ္စည်းပြသရန်နေရာ -->
    <div class="container">
        <div class="product-card">
            <img src="https://images.unsplash.com/photo-1726757523910-c44eb1c402e3?w=500" alt="iPhone 16 Pro Max">
            <div class="title">iPhone 16 Pro Max</div>
            <div class="price">ဈေးနှုန်း - $1,200</div>
            <button class="btn" onclick="selectProduct('iPhone 16 Pro Max')">ချက်ချင်းဝယ်ယူမည်</button>
        </div>

        <div class="product-card">
            <img src="https://images.unsplash.com/photo-1542496658-e33a6d0d50f6?w=500" alt="Apple Watch Ultra">
            <div class="title">Apple Watch Ultra</div>
            <div class="price">ဈေးနှုန်း - $799</div>
            <button class="btn" onclick="selectProduct('Apple Watch Ultra')">ချက်ချင်းဝယ်ယူမည်</button>
        </div>
    </div>

    <!-- ဝယ်ယူရန် ဖောင်ဒီဇိုင်း -->
    <div class="order-form-section" id="order-form">
        <h2>🛍️ ပစ္စည်းမှာယူရန် ဖောင်</h2>
        <form id="shopOrderForm">
            <div class="form-group">
                <label for="product">မှာယူမည့်ပစ္စည်း</label>
                <select id="product" required>
                    <option value="">-- ပစ္စည်းရွေးချယ်ပါ --</option>
                    <option value="iPhone 16 Pro Max">iPhone 16 Pro Max ($1,200)</option>
                    <option value="Apple Watch Ultra">Apple Watch Ultra ($799)</option>
                </select>
            </div>
            <div class="form-group">
                <label for="name">ဝယ်သူအမည်</label>
                <input type="text" id="name" placeholder="သင့်အမည် ရိုက်ထည့်ပါ" required>
            </div>
            <div class="form-group">
                <label for="phone">ဖုန်းနံပါတ်</label>
                <input type="tel" id="phone" placeholder="ဆက်သွယ်ရမည့် ဖုန်းနံပါတ်" required>
            </div>
            <div class="form-group">
                <label for="address">ပို့ဆောင်ရမည့် လိပ်စာ</label>
                <textarea id="address" rows="3" placeholder="အိမ်အမှတ်၊ လမ်း၊ မြို့နယ်" required></textarea>
            </div>
            <button type="button" class="submit-btn" onclick="sendOrder()">Messenger သို့ အော်ဒါပို့မည် 💬</button>
        </form>
    </div>

    <script>
        // ပစ္စည်းအောက်က ခလုတ်နှိပ်ရင် ဖောင်ထဲမှာ အလိုအလျောက် ပစ္စည်းနာမည် ရွေးပေးသွားမည့်စနစ်
        function selectProduct(productName) {
            document.getElementById('product').value = productName;
            document.getElementById('order-form').scrollIntoView({ behavior: 'smooth' });
        }

        // အော်ဒါအချက်အလက်များကို Messenger ဆီသို့ ပို့ပေးမည့်စနစ်
        function sendOrder() {
            const product = document.getElementById('product').value;
            const name = document.getElementById('name').value;
            const phone = document.getElementById('phone').value;
            const address = document.getElementById('address').value;

            if(!product || !name || !phone || !address) {
                alert("ကျေးဇူးပြု၍ အချက်အလက်များ အကုန်ဖြည့်ပေးပါဗျာ။");
                return;
            }

            // မှာယူတဲ့စာသားကို ပုံစံဖော်ခြင်း
            const message = `အော်ဒါအသစ် ရောက်ရှိပါတယ်ခင်ဗျာ-%0A🛍️ ပစ္စည်း: ${product}%0A👤 အမည်: ${name}%0A📞 ဖုန်း: ${phone}%0A📍 လိပ်စာ: ${address}`;
            
            // သင့်ရဲ့ Facebook Page သို့မဟုတ် Messenger လင့်ခ်ဆီသို့ ပို့ဆောင်ပေးခြင်း
            // (မှတ်ချက် - သင့်မှာ Facebook Page ရှိရင် 'me' နေရာမှာ Page Username အစားထိုးနိုင်ပါတယ်)
            const messengerUrl = `https://m.me/me?text=${message}`;

            // Messenger အက်ပ်ကို လှမ်းဖွင့်လိုက်ခြင်း
            window.open(messengerUrl, '_blank');
        }
    </script>
</body>
</html>
